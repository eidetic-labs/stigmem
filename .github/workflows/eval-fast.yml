name: Eval fast subset

on:
  pull_request:
  push:
    branches: ["main", "phase/**", "feat/**"]

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect eval surfaces
    runs-on: ubuntu-latest
    outputs:
      eval: ${{ steps.filter.outputs.eval }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            eval:
              - ".github/workflows/eval-fast.yml"
              - "pyproject.toml"
              - "uv.lock"
              - "conftest.py"
              - "eval/**"
              - "node/**"
              - "sdks/stigmem-py/**"
              - "spec/**"
              - "data/conformance/**"

  eval-fast:
    name: Eval harness (adversarial + recall, ≤5 min)
    needs: detect-changes
    if: needs.detect-changes.outputs.eval == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Run eval suite and capture timings
        env:
          STIGMEM_EVAL_URL: ""
        run: |
          mkdir -p artifacts eval/results
          sync_start_ms="$(date +%s%3N)"
          uv sync --all-packages
          sync_end_ms="$(date +%s%3N)"

          uv run pytest eval/test_adversarial.py -v --tb=short \
            --rootdir=. \
            -p no:cacheprovider \
            -p no:cov
          adversarial_end_ms="$(date +%s%3N)"

          uv run pytest eval/test_recall.py -v --tb=short \
            --rootdir=. \
            -p no:cacheprovider \
            -p no:cov
          recall_end_ms="$(date +%s%3N)"

          python3 - <<'EOF' \
            "$sync_start_ms" \
            "$sync_end_ms" \
            "$adversarial_end_ms" \
            "$recall_end_ms"
          import json
          import sys
          from pathlib import Path

          labels = [
              ("uv-sync", int(sys.argv[1]), int(sys.argv[2])),
              ("adversarial-pytest", int(sys.argv[2]), int(sys.argv[3])),
              ("recall-pytest", int(sys.argv[3]), int(sys.argv[4])),
          ]
          rows = []
          for name, start_ms, end_ms in labels:
              duration_ms = end_ms - start_ms
              rows.append(
                  {
                      "name": name,
                      "duration_ms": duration_ms,
                      "duration_s": round(duration_ms / 1000, 3),
                  }
              )
          Path("artifacts/eval-fast-timings.json").write_text(
              json.dumps(rows, indent=2) + "\n",
              encoding="utf-8",
          )
          EOF

      - name: Validate ADR-015 corpus
        run: uv run python scripts/validate_adversarial_corpus.py

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eval-results-${{ github.sha }}
          path: eval/results/
          retention-days: 30

      - name: Upload eval timing artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eval-fast-timings-${{ github.sha }}
          path: artifacts/eval-fast-timings.json
          retention-days: 30

      - name: Check adversarial total count
        run: |
          python3 - <<'EOF'
          import json, pathlib, sys

          classes = [
            "typo_squatted", "contradiction_floods", "tombstone_bypass",
            "capability_token", "sanitizer_bypass",
          ]
          total = 0
          corpus_dir = pathlib.Path("eval/corpus/adversarial")
          for cls in classes:
              scenarios = []
              for path in sorted((corpus_dir / cls).glob("*.json")):
                  data = json.loads(path.read_text())
                  if isinstance(data, list):
                      scenarios.extend(data)
                  else:
                      scenarios.append(data)
              print(f"  {cls}: {len(scenarios)}")
              total += len(scenarios)
          if total != 79:
              print(f"ERROR: expected 79 scenarios, got {total}", file=sys.stderr)
              sys.exit(1)
          print(f"OK: {total} adversarial scenarios")
          EOF

      - name: Verify recall probe count
        run: |
          python3 - <<'EOF'
          import json, pathlib, sys
          probes = json.loads(pathlib.Path("eval/corpus/recall/probes.json").read_text())
          if len(probes) != 400:
              print(f"ERROR: expected 400 probes, got {len(probes)}", file=sys.stderr)
              sys.exit(1)
          print(f"OK: {len(probes)} recall probes")
          EOF

      - name: Verify baseline.json schema
        run: |
          python3 - <<'EOF'
          import json, pathlib, sys
          baseline = json.loads(pathlib.Path("eval/corpus/recall/baseline.json").read_text())
          required = {"nDCG@10", "Recall@5", "corpus_sha", "server_version", "recorded_at"}
          missing = required - set(baseline.keys())
          if missing:
              print(f"ERROR: baseline.json missing keys: {missing}", file=sys.stderr)
              sys.exit(1)
          print(f"OK: baseline.json schema valid — nDCG@10={baseline['nDCG@10']}")
          EOF
