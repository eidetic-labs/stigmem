      - "0.9.xA"
    spec_section: (operation-specific)
    stability: experimental
    requires:
      node: ">=0.9.0a1"
    notes: "Shared lint and decay background job lifecycle; broader queue controls remain future-horizon work."

  - id: decay
    name: Decay semantics
    feature_record: features/decay/README.md
