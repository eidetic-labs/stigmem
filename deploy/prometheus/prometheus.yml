global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: stigmem-node-a
    static_configs:
      - targets: ["node-a:8765"]
    metrics_path: /metrics

  - job_name: stigmem-node-b
    static_configs:
      - targets: ["node-b:8765"]
    metrics_path: /metrics
