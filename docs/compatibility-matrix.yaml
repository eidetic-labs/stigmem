    name: OpenClaw
    requires:
      openclaw_adapter: ">=0.9.0a2,<1.0.0"
      python_sdk: ">=0.9.0a2,<1.0.0"
    notes: "Hardened v0.9 adapter; experimental flag until external operator soak per ADR-002."

features:
  - id: typed-facts
    name: Immutable typed facts
    spec_section: §2, §3
    stability: stable
    requires:
      node: ">=0.9.0a1"
      python_sdk: ">=0.9.0a1"
    notes: "Core data model. CIDs (§25) are stable in core per ADR-017."

  - id: scope-enforcement
    name: Scope enforcement (local/team/company/public)
    spec_section: §3.5
    stability: stable
    requires:
      node: ">=0.9.0a1"

  - id: federation-basic
    name: Two-node mTLS federation
    spec_section: §22.1, §19 (basic)
    stability: stable
    requires:
      node: ">=0.9.0a1"
    notes: "Capability tokens, manifests, mTLS. Advanced trust scoring deferred to experimental/."

  - id: content-addressed-ids
    name: Content-addressed fact IDs
    feature_record: features/content-addressed-ids/README.md
    feature_type: core
    default_surface: default
    implementation_path: node/src/stigmem_node/cid.py
    package: stigmem-node
    release_lines:
      - "v0.9.0a1"
      - "v0.9.0a3"
    spec_section: §25
    stability: stable
    requires:
      node: ">=0.9.0a1"
    notes: "Core feature per ADR-017 (amendment to ADR-011). Load-bearing for ADR-003 trust boundary + ADR-016 immutability stack."

  - id: async-jobs
    name: Async jobs
    feature_record: features/async-jobs/README.md
    feature_type: core
    default_surface: opt-in
