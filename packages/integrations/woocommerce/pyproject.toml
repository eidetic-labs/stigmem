[project]
name = "agent-platform-integration-woocommerce"
version = "0.1.0"
description = "Integration connector for woocommerce"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
  "agent-platform-core",
  "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/woocommerce"]
