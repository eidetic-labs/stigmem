# 4-node stigmem federation soak.
# Requires soak/.env generated by:  python soak/keys.py > soak/.env
# Usage:
#   cd stigmem/infra
#   docker compose -f docker-compose.soak.yml --env-file soak/.env up -d --build
#
# Node topology (full-mesh pull replication, interval 10s):
#   node-a :8765  node-b :8766  node-c :8767  node-d :8768 (host ports)
#   Internal Docker hostnames: node-a, node-b, node-c, node-d  (all port 8765)

networks:
  soak_net:
    name: soak_net

volumes:
  data_a: {}
  data_b: {}
  data_c: {}
  data_d: {}

services:

  node-a:
    build:
      context: ../node
    container_name: soak-node-a
    hostname: node-a
    networks:
      - soak_net
    ports:
      - "8765:8765"
    volumes:
      - data_a:/data
    environment:
      STIGMEM_DB_PATH: /data/stigmem.db
      STIGMEM_HOST: "0.0.0.0"
      STIGMEM_PORT: "8765"
      STIGMEM_NODE_URL: "http://node-a:8765"
      STIGMEM_FEDERATION_ENABLED: "true"
      STIGMEM_FEDERATION_PULL_INTERVAL_S: "10"
      STIGMEM_LOG_LEVEL: "warning"
      STIGMEM_FEDERATION_PUBKEY: "${NODE_A_PUBKEY}"
      STIGMEM_FEDERATION_PRIVKEY: "${NODE_A_PRIVKEY}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8765/healthz')\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  node-b:
    build:
      context: ../node
    container_name: soak-node-b
    hostname: node-b
    networks:
      - soak_net
    ports:
      - "8766:8765"
    volumes:
      - data_b:/data
    environment:
      STIGMEM_DB_PATH: /data/stigmem.db
      STIGMEM_HOST: "0.0.0.0"
      STIGMEM_PORT: "8765"
      STIGMEM_NODE_URL: "http://node-b:8765"
      STIGMEM_FEDERATION_ENABLED: "true"
      STIGMEM_FEDERATION_PULL_INTERVAL_S: "10"
      STIGMEM_LOG_LEVEL: "warning"
      STIGMEM_FEDERATION_PUBKEY: "${NODE_B_PUBKEY}"
      STIGMEM_FEDERATION_PRIVKEY: "${NODE_B_PRIVKEY}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8765/healthz')\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  node-c:
    build:
      context: ../node
    container_name: soak-node-c
    hostname: node-c
    networks:
      - soak_net
    ports:
      - "8767:8765"
    volumes:
      - data_c:/data
    environment:
      STIGMEM_DB_PATH: /data/stigmem.db
      STIGMEM_HOST: "0.0.0.0"
      STIGMEM_PORT: "8765"
      STIGMEM_NODE_URL: "http://node-c:8765"
      STIGMEM_FEDERATION_ENABLED: "true"
      STIGMEM_FEDERATION_PULL_INTERVAL_S: "10"
      STIGMEM_LOG_LEVEL: "warning"
      STIGMEM_FEDERATION_PUBKEY: "${NODE_C_PUBKEY}"
      STIGMEM_FEDERATION_PRIVKEY: "${NODE_C_PRIVKEY}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8765/healthz')\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  node-d:
    build:
      context: ../node
    container_name: soak-node-d
    hostname: node-d
    networks:
      - soak_net
    ports:
      - "8768:8765"
    volumes:
      - data_d:/data
    environment:
      STIGMEM_DB_PATH: /data/stigmem.db
      STIGMEM_HOST: "0.0.0.0"
      STIGMEM_PORT: "8765"
      STIGMEM_NODE_URL: "http://node-d:8765"
      STIGMEM_FEDERATION_ENABLED: "true"
      STIGMEM_FEDERATION_PULL_INTERVAL_S: "10"
      STIGMEM_LOG_LEVEL: "warning"
      STIGMEM_FEDERATION_PUBKEY: "${NODE_D_PUBKEY}"
      STIGMEM_FEDERATION_PRIVKEY: "${NODE_D_PRIVKEY}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8765/healthz')\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
