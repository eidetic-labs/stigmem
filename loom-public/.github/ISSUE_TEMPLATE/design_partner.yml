name: Design partner interest
description: Express interest in co-authoring the federation section
title: "Design partner: "
labels: ["design-partner"]
body:
  - type: markdown
    attributes:
      value: |
        We're looking for teams with production experience in agent memory, knowledge graphs, or agent coordination to co-author the federation section of Loom v0.3. Co-authors are named in the spec.

  - type: textarea
    id: background
    attributes:
      label: What have you built?
      description: Brief description of your system — what it does, at what scale, what the hard problems were.
    validations:
      required: true

  - type: textarea
    id: federation_opinions
    attributes:
      label: What are your strongest opinions about federation?
      description: What should Loom get right? What have you seen go wrong in other systems?
    validations:
      required: false

  - type: input
    id: contact
    attributes:
      label: Best way to reach you
      description: Email, Twitter/X, LinkedIn, or leave blank to DM on GitHub
    validations:
      required: false
