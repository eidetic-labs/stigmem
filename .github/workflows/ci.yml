name: CI

on:
  push:
    branches: ["main", "feat/**", "chore/**", "fix/**"]
  pull_request:

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect changed surfaces
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      node: ${{ steps.filter.outputs.node }}
      contract: ${{ steps.filter.outputs.contract }}
      sdk_compat: ${{ steps.filter.outputs.sdk_compat }}
      coverage: ${{ steps.filter.outputs.coverage }}
      go: ${{ steps.filter.outputs.go }}
      docs: ${{ steps.filter.outputs.docs }}
      obsidian: ${{ steps.filter.outputs.obsidian }}
      dashboard_e2e: ${{ steps.filter.outputs.dashboard_e2e }}
      migration_compat: ${{ steps.filter.outputs.migration_compat }}
      quickstart: ${{ steps.filter.outputs.quickstart }}
      helm: ${{ steps.filter.outputs.helm }}
      container: ${{ steps.filter.outputs.container }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            python:
              - '.github/workflows/ci.yml'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'conftest.py'
              - 'scripts/check.sh'
              - 'scripts/check_ruff_baseline.py'
              - 'scripts/check_mypy_baseline.py'
              - 'scripts/check_constant_time.py'
              - 'node/**'
              - 'sdks/stigmem-py/**'
              - 'adapters/**/*.py'
              - 'adapters/**/pyproject.toml'
            node:
              - '.github/workflows/ci.yml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - 'scripts/check.sh'
              - 'adapters/mcp/**'
              - 'experimental/dashboard/**'
              - 'sdks/stigmem-ts/**'
            contract:
              - '.github/workflows/ci.yml'
              - 'scripts/check.sh'
              - 'scripts/export_openapi.py'
              - 'docs/openapi/**'
              - 'node/**'
              - 'spec/**'
              - 'data/conformance/**'
              - 'sdks/stigmem-ts/**'
            sdk_compat:
              - '.github/workflows/ci.yml'
              - 'scripts/check_sdk_compat.sh'
              - 'node/**'
              - 'sdks/stigmem-py/**'
              - 'sdks/stigmem-ts/**'
              - 'experimental/sdk-go/**'
            coverage:
              - '.github/workflows/ci.yml'
              - 'pyproject.toml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'node/**'
              - 'sdks/stigmem-py/**'
              - 'sdks/stigmem-ts/**'
              - 'adapters/mcp/**'
              - 'experimental/dashboard/**'
            go:
              - '.github/workflows/ci.yml'
              - 'scripts/check.sh'
              - 'experimental/sdk-go/**'
            docs:
              - '.github/workflows/ci.yml'
              - 'scripts/check.sh'
              - 'docs/**'
            obsidian:
              - '.github/workflows/ci.yml'
              - 'scripts/check.sh'
              - 'experimental/obsidian-adapter/plugin/**'
            dashboard_e2e:
              - '.github/workflows/ci.yml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'experimental/dashboard/**'
            migration_compat:
              - '.github/workflows/ci.yml'
              - 'node/migrations/**'
              - 'node/src/**'
              - 'node/tests/test_migration_compat.py'
              - 'scripts/check.sh'
            quickstart:
              - '.github/workflows/ci.yml'
              - 'docker-compose.yml'
              - 'scripts/quickstart-verify.sh'
              - 'node/**'
              - 'deploy/**'
            helm:
              - '.github/workflows/ci.yml'
              - 'experimental/deploy-helm/**'
              - 'experimental/deploy-helm/**'
            container:
              - '.github/workflows/ci.yml'
              - 'node/**'
              - 'node/Dockerfile'
              - 'deploy/seccomp/**'
              - 'docker-compose.yml'

  python-tests:
    name: Python checks (lint + type + tests + security)
    needs: detect-changes
    if: needs.detect-changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Python fast gates
        env:
          HYPOTHESIS_SEED: "0"
          PYTEST_TIMEOUT_SECONDS: "120"
          PYTEST_JUNIT_DIR: artifacts/python-junit
          CHECK_TIMING_OUTPUT: artifacts/python-check-timings.json
        run: bash scripts/check.sh python

      - name: Coverage baseline ratchet
        run: uv run python scripts/check_coverage_baseline.py

      - name: Changed-file Python strictness
        run: uv run python scripts/check_changed_python_quality.py

      - name: Upload Python test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: python-test-artifacts
          path: |
            artifacts/python-junit/
            artifacts/python-check-timings.json
          retention-days: 14

  node-tests:
    name: TypeScript checks (SDK + MCP + dashboard)
    needs: detect-changes
    if: needs.detect-changes.outputs.node == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: TypeScript fast gates
        env:
          CHECK_TIMING_OUTPUT: artifacts/node-check-timings.json
        run: bash scripts/check.sh node

      - name: Upload Node timing artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: node-check-timings
          path: artifacts/node-check-timings.json
          retention-days: 14

  contract-checks:
    name: Contract checks (OpenAPI + generated SDK)
    needs: detect-changes
    if: needs.detect-changes.outputs.contract == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Contract fast gates
        run: bash scripts/check.sh contract

  sdk-compat-smoke:
    name: SDK compatibility smoke
    needs: detect-changes
    if: needs.detect-changes.outputs.sdk_compat == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache-dependency-path: experimental/sdk-go/go.mod

      - name: SDK compatibility fast gate
        run: bash scripts/check_sdk_compat.sh

  coverage-report:
    name: Coverage report
    needs: detect-changes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.coverage == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: |
          uv sync --all-packages
          pnpm install --frozen-lockfile

      - name: Python coverage
        env:
          HYPOTHESIS_SEED: "0"
        run: |
          mkdir -p coverage/python
          uv run pytest node/tests/ sdks/stigmem-py/tests/ \
            --cov=node/src --cov=sdks/stigmem-py/src \
            --cov-branch \
            --cov-report=xml:coverage/python/coverage.xml \
            --cov-report=term

      - name: Build TypeScript packages
        run: pnpm build

      - name: TypeScript coverage
        run: |
          pnpm --filter stigmem-ts exec vitest run --coverage --coverage.reporter=text --coverage.reporter=json --coverage.reporter=lcov
          pnpm --filter stigmem-mcp exec vitest run --exclude 'dist/**' --coverage --coverage.reporter=text --coverage.reporter=json --coverage.reporter=lcov
          pnpm --filter dashboard exec vitest run --coverage --coverage.reporter=text --coverage.reporter=json --coverage.reporter=lcov

      - name: Summarize per-package coverage
        run: |
          uv run python scripts/summarize_coverage.py | tee coverage/summary.md
          cat coverage/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-artifacts
          path: |
            coverage/python/coverage.xml
            coverage/summary.md
            sdks/stigmem-ts/coverage/**
            adapters/mcp/coverage/**
            experimental/dashboard/coverage/**

  go-tests:
    name: Go SDK tests
    needs: detect-changes
    if: needs.detect-changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache-dependency-path: experimental/sdk-go/go.mod

      - name: Go fast gates
        run: bash scripts/check.sh go

  docs-build:
    name: Docs build
    needs: detect-changes
    if: needs.detect-changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: docs/package-lock.json

      - name: Docs fast gates
        run: bash scripts/check.sh docs

  obsidian-plugin-build:
    name: Obsidian plugin build
    needs: detect-changes
    if: needs.detect-changes.outputs.obsidian == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: experimental/obsidian-adapter/plugin/package-lock.json

      - name: Obsidian fast gates
        run: bash scripts/check.sh obsidian

  dashboard-e2e:
    name: Dashboard Playwright smoke
    needs: detect-changes
    if: needs.detect-changes.outputs.dashboard_e2e == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter dashboard exec playwright install --with-deps chromium

      - name: Run dashboard browser smoke
        run: pnpm --filter dashboard exec playwright test

      - name: Upload dashboard test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dashboard-playwright-pr
          path: |
            experimental/dashboard/test-results/
            experimental/dashboard/playwright-report/
          retention-days: 14

  migration-compat:
    name: Schema migration compatibility
    needs: detect-changes
    if: needs.detect-changes.outputs.migration_compat == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install workspace packages
        run: uv sync --all-packages

      - name: Run migration compatibility tests
        run: |
          mkdir -p artifacts
          uv run pytest node/tests/test_migration_compat.py -q --tb=short \
            --timeout=120 \
            --junitxml=artifacts/migration-compat-junit.xml

      - name: Upload migration test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: migration-compat-pr
          path: artifacts/migration-compat-junit.xml
          retention-days: 14

  quickstart-smoke:
    name: Quickstart Docker smoke
    needs: detect-changes
    if: needs.detect-changes.outputs.quickstart == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Run quickstart smoke
        run: bash scripts/quickstart-verify.sh

  helm-lint:
    name: Helm chart lint
    needs: detect-changes
    if: needs.detect-changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: "3.17.0"

      - name: Lint stigmem chart (infra)
        run: helm lint experimental/deploy-helm/stigmem

      - name: Lint stigmem chart (deploy)
        run: helm lint experimental/deploy-helm/stigmem

      - name: Dry-run install (template rendering)
        run: |
          helm template stigmem ./experimental/deploy-helm/stigmem \
            --debug \
            --set image.pullPolicy=Never

  docs-drift:
    name: Docs drift watchdog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run drift check
        run: python docs/scripts/check_drift.py

  container-smoke:
    name: Container hardening smoke test
    needs: detect-changes
    if: needs.detect-changes.outputs.container == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # needed for cosign keyless verify in future; harmless now

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build hardened image (linux/amd64)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./node/Dockerfile
          platforms: linux/amd64
          load: true
          tags: stigmem-node:ci-smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image runs as non-root (UID 65532)
        run: |
          uid=$(docker run --rm stigmem-node:ci-smoke id -u)
          echo "Container UID: $uid"
          [ "$uid" = "65532" ] || (echo "ERROR: expected UID 65532, got $uid" && exit 1)

      - name: Verify read-only root filesystem
        run: |
          docker run --rm --read-only \
            --tmpfs /tmp:mode=1777 \
            --tmpfs /run:mode=755 \
            -v ci-smoke-data:/data \
            -e STIGMEM_DB_PATH=/data/smoke.db \
            -e STIGMEM_HOST=0.0.0.0 \
            -e STIGMEM_PORT=8765 \
            --cap-drop ALL \
            -d --name ci-smoke stigmem-node:ci-smoke
          # Wait for healthcheck
          for i in $(seq 1 20); do
            status=$(docker inspect --format='{{.State.Health.Status}}' ci-smoke 2>/dev/null || echo starting)
            echo "Health: $status (attempt $i)"
            [ "$status" = "healthy" ] && break
            sleep 2
          done
          docker inspect --format='{{.State.Health.Status}}' ci-smoke | grep -q healthy \
            || (docker logs ci-smoke && exit 1)
          docker rm -f ci-smoke
          docker volume rm ci-smoke-data || true

      - name: Generate SBOM with syft
        uses: anchore/sbom-action@v0
        with:
          image: stigmem-node:ci-smoke
          format: spdx-json
          output-file: stigmem-node-ci-sbom.spdx.json
          upload-artifact: false

      - name: Verify SBOM contains expected packages
        run: |
          python3 - <<'EOF'
          import json, sys
          with open("stigmem-node-ci-sbom.spdx.json") as f:
              sbom = json.load(f)
          names = {p.get("name","").lower() for p in sbom.get("packages", [])}
          required = {"fastapi", "uvicorn", "pydantic"}
          missing = required - names
          if missing:
              print(f"SBOM missing expected packages: {missing}", file=sys.stderr)
              sys.exit(1)
          print(f"SBOM OK — {len(names)} packages found, required set present")
          EOF

      - name: Validate seccomp denylist completeness
        run: |
          python3 - <<'EOF'
          import json, sys

          with open("deploy/seccomp/stigmem-node.json") as f:
              profile = json.load(f)

          denied = set()
          for rule in profile.get("syscalls", []):
              if rule.get("action") == "SCMP_ACT_ERRNO":
                  denied.update(rule.get("names", []))

          # Syscalls that must be in the denylist; regression check against
          # Docker moby default + stigmem-specific additions (F2/F3 findings).
          required = {
              # container escape / namespace manipulation
              "pivot_root", "mount", "umount2", "unshare", "setns",
              "open_tree", "move_mount", "fsopen", "fsconfig", "fsmount", "fspick",
              # Shocker-class container escape (F3)
              "open_by_handle_at", "name_to_handle_at",
              # io_uring exploit surface (F2)
              "io_uring_setup", "io_uring_enter", "io_uring_register",
              # cross-process info disclosure (F3)
              "kcmp",
              # time manipulation (F3)
              "clock_settime",
              # disk quota info disclosure (F3)
              "quotactl",
              # process injection
              "ptrace", "process_vm_readv", "process_vm_writev",
              # kernel / boot
              "kexec_load", "kexec_file_load", "reboot",
              # eBPF
              "bpf", "perf_event_open",
          }

          missing = required - denied
          if missing:
              print(f"ERROR: seccomp denylist is missing required syscalls: {sorted(missing)}", file=sys.stderr)
              sys.exit(1)
          print(f"Seccomp denylist OK — {len(denied)} syscalls denied, all {len(required)} required entries present")
          EOF
