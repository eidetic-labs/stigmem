  mcp_adapter:
    name: stigmem-mcp
    versions: []  # not aligned to the alpha.2 artifact set; deferred to experimental/mcp-adapter/
  lazy_instruction_plugin:
    name: stigmem-plugin-lazy-instruction-discovery
    versions: []  # source extracted on main; signed/package artifact evidence deferred to the plugin launch train (#298)

connectors:
