name: Conformance

on:
  push:
    branches: [main]
    paths:
      - "node/**"
      - "spec/**"
      - "data/conformance/**"
      - ".github/workflows/conformance.yml"
  pull_request:
    paths:
      - "node/**"
      - "spec/**"
      - "data/conformance/**"
      - ".github/workflows/conformance.yml"

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------------
  # Legacy v1 wire-format conformance vectors (zero-skip enforced).
  # This is the default no-plugin install and remains the v1.0 critical path.
  # -------------------------------------------------------------------------
  conformance-vectors:
    name: Stigmem v1.0 Wire Conformance (vectors)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install stigmem-node with dev dependencies
        run: |
          pip install -e "node[dev]" cryptography PyJWT

      - name: Run conformance suite (zero skips enforced)
        run: |
          pytest node/tests/conformance/test_conformance_v1.py \
            -v \
            --tb=short \
            -p no:randomly \
            --strict-markers
        env:
          STIGMEM_DB_PATH: ":memory:"
          STIGMEM_AUTH_REQUIRED: "false"
          STIGMEM_SOURCE_ATTESTATION_MODE: "warn"

  # -------------------------------------------------------------------------
  # v2.0 wire-format conformance vectors (§19–§25, zero-skip enforced)
  # -------------------------------------------------------------------------
  conformance-vectors-v2:
    name: Stigmem v2.0 Wire Conformance (vectors)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install stigmem-node with dev dependencies
        run: |
          pip install -e "node[dev]" cryptography PyJWT

      - name: Run v2.0 conformance suite (zero skips enforced)
        run: |
          pytest node/tests/conformance/test_conformance_v2.py \
            -v \
            --tb=short \
            -p no:randomly \
            --strict-markers
        env:
          STIGMEM_DB_PATH: ":memory:"
          STIGMEM_AUTH_REQUIRED: "false"
          STIGMEM_SOURCE_ATTESTATION_MODE: "warn"

  # -------------------------------------------------------------------------
  # Protocol-level adversarial conformance vectors (Phase B §5.2)
  # -------------------------------------------------------------------------
  conformance-adversarial-protocol:
    name: Protocol adversarial conformance (vectors)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install stigmem-node with dev dependencies
        run: |
          pip install -e "node[dev]" cryptography PyJWT

      - name: Run protocol adversarial conformance suite
        run: |
          pytest node/tests/conformance/test_conformance_adversarial_protocol.py \
            -v \
            --tb=short \
            -p no:randomly \
            --strict-markers
        env:
          STIGMEM_DB_PATH: ":memory:"
          STIGMEM_AUTH_REQUIRED: "false"
          STIGMEM_SOURCE_ATTESTATION_MODE: "warn"

  # -------------------------------------------------------------------------
  # Multi-backend behavioral conformance suite (Phase 11)
  # Parameterized over sqlite, libsql, and postgres (feature-flagged).
  # -------------------------------------------------------------------------
  conformance-multi-backend:
    name: Multi-backend conformance (${{ matrix.backend }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        backend: [sqlite, libsql, postgres]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: stigmem
          POSTGRES_PASSWORD: stigmem_test
          POSTGRES_DB: stigmem_conformance
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install stigmem-node (all extras)
        run: |
          uv pip install --system -e "node[dev,libsql,postgres,conformance]"

      - name: Run conformance suite — ${{ matrix.backend }}
        run: |
          python -m stigmem_conformance \
            --backend ${{ matrix.backend }} \
            --report conformance-${{ matrix.backend }}.md \
            --verbose
        env:
          STIGMEM_TEST_PG_DSN: "postgresql://stigmem:stigmem_test@localhost/stigmem_conformance"
          STIGMEM_AUTH_REQUIRED: "false"
          STIGMEM_SOURCE_ATTESTATION_MODE: "warn"

      - name: Upload conformance report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: conformance-report-${{ matrix.backend }}
          path: conformance-${{ matrix.backend }}.md
          retention-days: 30

  # -------------------------------------------------------------------------
  # Full-plugin behavioral conformance smoke (representative plugin install)
  # -------------------------------------------------------------------------
  conformance-full-plugins:
    name: Full-plugin conformance (sqlite)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install stigmem-node (conformance extras)
        run: |
          uv pip install --system -e "node[dev,conformance]"

      - name: Run conformance suite with representative plugin profile
        run: |
          python -m stigmem_conformance \
            --backend sqlite \
            --plugin-profile full \
            --report conformance-sqlite-full-plugins.md \
            --verbose
        env:
          STIGMEM_AUTH_REQUIRED: "false"
          STIGMEM_SOURCE_ATTESTATION_MODE: "warn"

      - name: Upload full-plugin conformance report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: conformance-report-sqlite-full-plugins
          path: conformance-sqlite-full-plugins.md
          retention-days: 30

  # -------------------------------------------------------------------------
  # Gate: all conformance lanes must be green before merging to main
  # -------------------------------------------------------------------------
  conformance-gate:
    name: Conformance gate (all backends)
    needs:
      - conformance-vectors
      - conformance-vectors-v2
      - conformance-adversarial-protocol
      - conformance-multi-backend
      - conformance-full-plugins
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all conformance jobs passed
        run: |
          if [[ "${{ needs.conformance-vectors.result }}" != "success" ]]; then
            echo "conformance-vectors failed" && exit 1
          fi
          if [[ "${{ needs.conformance-vectors-v2.result }}" != "success" ]]; then
            echo "conformance-vectors-v2 failed" && exit 1
          fi
          if [[ "${{ needs.conformance-adversarial-protocol.result }}" != "success" ]]; then
            echo "conformance-adversarial-protocol failed" && exit 1
          fi
          if [[ "${{ needs.conformance-multi-backend.result }}" != "success" ]]; then
            echo "conformance-multi-backend failed" && exit 1
          fi
          if [[ "${{ needs.conformance-full-plugins.result }}" != "success" ]]; then
            echo "conformance-full-plugins failed" && exit 1
          fi
          echo "All conformance checks passed."
