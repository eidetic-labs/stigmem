# eval/federation/docker-compose.yml
# 3-node stigmem federation cluster for the eval soak harness.
#
# Keypairs are generated by soak_driver.py → eval/federation/.env (idempotent).
# Managed entirely by soak_driver.py; do not start manually.
# make eval-soak-smoke  — 5-min abbreviated run (all 5 CC scenarios)
# make eval-soak        — full 1-hour run

networks:
  eval_fed_net:
    name: eval_fed_net

volumes:
  eval_fed_data_a: {}
  eval_fed_data_b: {}
  eval_fed_data_c: {}

x-eval-node: &eval-node
  build:
    context: ../..
    dockerfile: node/Dockerfile
  networks:
    - eval_fed_net
  user: "65532:65532"
  read_only: true
  tmpfs:
    - /tmp:mode=1777,size=64m
    - /run:mode=755,size=16m
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/healthz')"]
    interval: 5s
    timeout: 5s
    retries: 24
    start_period: 15s

services:
  node-a:
    <<: *eval-node
    container_name: eval-fed-node-a
    hostname: node-a
    ports:
      - "8780:8765"
    volumes:
      - eval_fed_data_a:/data
    environment:
      STIGMEM_DB_PATH: /data/stigmem.db
      STIGMEM_HOST: "0.0.0.0"
      STIGMEM_PORT: "8765"
      STIGMEM_NODE_URL: "http://node-a:8765"
      STIGMEM_FEDERATION_ENABLED: "true"
      STIGMEM_FEDERATION_PULL_INTERVAL_S: "5"
      STIGMEM_LOG_LEVEL: "warning"
      STIGMEM_AUTH_REQUIRED: "true"
      STIGMEM_FEDERATION_PUBKEY: "${NODE_A_PUBKEY}"
      STIGMEM_FEDERATION_PRIVKEY: "${NODE_A_PRIVKEY}"

  node-b:
    <<: *eval-node
    container_name: eval-fed-node-b
    hostname: node-b
    ports:
      - "8781:8765"
    volumes:
      - eval_fed_data_b:/data
    environment:
      STIGMEM_DB_PATH: /data/stigmem.db
      STIGMEM_HOST: "0.0.0.0"
      STIGMEM_PORT: "8765"
      STIGMEM_NODE_URL: "http://node-b:8765"
      STIGMEM_FEDERATION_ENABLED: "true"
      STIGMEM_FEDERATION_PULL_INTERVAL_S: "5"
      STIGMEM_LOG_LEVEL: "warning"
      STIGMEM_AUTH_REQUIRED: "true"
      STIGMEM_FEDERATION_PUBKEY: "${NODE_B_PUBKEY}"
      STIGMEM_FEDERATION_PRIVKEY: "${NODE_B_PRIVKEY}"

  node-c:
    <<: *eval-node
    container_name: eval-fed-node-c
    hostname: node-c
    ports:
      - "8782:8765"
    volumes:
      - eval_fed_data_c:/data
    environment:
      STIGMEM_DB_PATH: /data/stigmem.db
      STIGMEM_HOST: "0.0.0.0"
      STIGMEM_PORT: "8765"
      STIGMEM_NODE_URL: "http://node-c:8765"
      STIGMEM_FEDERATION_ENABLED: "true"
      STIGMEM_FEDERATION_PULL_INTERVAL_S: "5"
      STIGMEM_LOG_LEVEL: "warning"
      STIGMEM_AUTH_REQUIRED: "true"
      STIGMEM_FEDERATION_PUBKEY: "${NODE_C_PUBKEY}"
      STIGMEM_FEDERATION_PRIVKEY: "${NODE_C_PRIVKEY}"
