# Two-node stigmem federation quickstart.
#
# Default behavior: pull pre-built multi-arch images from GHCR
# (ghcr.io/eidetic-labs/stigmem-node:0.9.0a1). Falls back to local
# build from node/Dockerfile if the image can't be pulled (e.g.,
# pre-first-publish working copy, or in air-gapped environments).
#
# Adopter usage:
#   docker compose up -d                  # pulls from GHCR; fast
# Contributor usage:
#   docker compose up --build -d          # forces local rebuild
#
# After v0.9.0a1 publishes, the image: tag below is the canonical
# artifact. Bump it on each release per docs/internal/release-cadence.md.
#
# Why a pinned version tag (and not :latest, :edge, or :<sha>)?
#   - This compose file is the quickstart adopters land on. We pin to a
#     specific release so a fresh clone today reproduces the same image
#     a fresh clone tomorrow does. Latest would silently advance on the
#     next release; :<sha> would not survive the 90-day retention.
#   - For hardened / supply-chain-conscious production deployments, swap
#     this to `ghcr.io/eidetic-labs/stigmem-node@sha256:<digest>` for a
#     tamper-evident pin. See docs/operators/deployment/install#image-tags
#     for the full tag-selection guide.
#
# Host ports default to 8765 (node-a) and 8766 (node-b). If those
# collide with another local stigmem-node (e.g., a Paperclip-managed
# instance), set STIGMEM_NODE_A_HOST_PORT and STIGMEM_NODE_B_HOST_PORT
# in your shell or .env to remap. The internal container port stays
# at 8765 — federation between containers uses the service-network
# DNS name (`http://node-a:8765`) regardless of the host port.
#
# This quickstart is an intentionally local, plaintext federation demo.
# Production federation must configure mTLS instead of using
# STIGMEM_FEDERATION_INSECURE.
services:
  node-a:
    image: ghcr.io/eidetic-labs/stigmem-node:0.9.0a1
    build:
      context: .
      dockerfile: node/Dockerfile
    ports:
      - "${STIGMEM_NODE_A_HOST_PORT:-8765}:8765"
    environment:
      STIGMEM_NODE_URL: "http://node-a:8765"
      STIGMEM_FEDERATION_ENABLED: "true"
      STIGMEM_FEDERATION_INSECURE: "1"
      STIGMEM_AUTH_REQUIRED: "false"
      STIGMEM_DB_PATH: "/data/stigmem.db"
      STIGMEM_LOG_LEVEL: "info"
    volumes:
      - node-a-data:/data
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
      - /run:mode=755,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  node-b:
    image: ghcr.io/eidetic-labs/stigmem-node:0.9.0a1
    build:
      context: .
      dockerfile: node/Dockerfile
    ports:
      - "${STIGMEM_NODE_B_HOST_PORT:-8766}:8765"
    environment:
      STIGMEM_NODE_URL: "http://node-b:8765"
      STIGMEM_FEDERATION_ENABLED: "true"
      STIGMEM_FEDERATION_INSECURE: "1"
      STIGMEM_AUTH_REQUIRED: "false"
      STIGMEM_DB_PATH: "/data/stigmem.db"
      STIGMEM_LOG_LEVEL: "info"
    volumes:
      - node-b-data:/data
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
      - /run:mode=755,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  node-a-data:
  node-b-data:
