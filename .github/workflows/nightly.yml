name: Nightly Federation Soak

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC daily on main
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: read

jobs:
  federation-soak:
    name: Federation soak (1 h)
    runs-on: ubuntu-latest
    timeout-minutes: 90     # 1-hour soak + 30 min buffer for build/teardown

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('node/Dockerfile', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install workspace packages
        run: uv sync --all-packages

      - name: Pre-build stigmem image (cache warm-up)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./node/Dockerfile
          load: true
          tags: stigmem-node:soak
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache (avoid unbounded growth)
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Run federation soak (1 hour)
        run: make eval-soak
        env:
          DOCKER_BUILDKIT: "1"

      - name: Upload soak artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-results-${{ github.run_id }}
          path: eval/results/
          retention-days: 30

      - name: Fail on soak failure
        if: failure()
        run: |
          echo "Federation soak failed — check eval/results/ artifact for details"
          exit 1
