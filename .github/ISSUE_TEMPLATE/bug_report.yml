name: Bug / spec ambiguity
description: Report reference-node behavior, docs, or spec text that is unclear or incorrect
title: "Bug: "
labels: ["bug"]
body:
  - type: dropdown
    id: kind
    attributes:
      label: Kind
      options:
        - Reference-node bug (incorrect behavior)
        - Documentation bug (incorrect or stale content)
        - Spec ambiguity (two valid readings)
        - Spec contradiction (two sections conflict)
        - Missing behavior (spec is silent on a case that matters)
    validations:
      required: true

  - type: input
    id: section
    attributes:
      label: Spec, doc, or code path (if applicable)
      placeholder: "Spec-05 Federation Trust, docs/docs/security/mtls.md, node/src/..."
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What did you observe or read? What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction (prototype bugs only)
      description: Steps to reproduce. Include commands, HTTP request/response, logs, and version/commit if relevant. Do not include secrets.
      render: bash
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, install method, Docker/Python/Node versions, and any relevant config.
      placeholder: "macOS 15, Docker Desktop 4.x, stigmem commit abc123..."
    validations:
      required: false
