name: version-consistency

on:
  pull_request:
    paths:
      - "pyproject.toml"
      - "**/pyproject.toml"
      - "package.json"
      - "**/package.json"
      - "**/Chart.yaml"
      - "README.md"
      - "CHANGELOG.md"
      - "LIMITATIONS.md"
      - "SECURITY.md"
      - "docs/openapi/stigmem.json"
      - "docs/versions.json"
      - "node/src/stigmem_conformance/__init__.py"
      - "node/src/stigmem_node/main.py"
      - "node/src/stigmem_node/plugins/manifest.py"
      - "node/src/stigmem_node/plugins/registry.py"
      - "release/version-surfaces.yaml"
      - "scripts/check_version_consistency.py"
      - "scripts/validate_version_surfaces.py"
      - ".github/workflows/version-consistency.yml"
  push:
    branches: [main]

# Workflow runs read-only: validates manifest schema + checks version-string
# consistency. Doesn't push, doesn't comment, doesn't create releases. Restrict
# GITHUB_TOKEN to the minimum (`contents: read`) per CodeQL Workflow-permissions
# recommendation.
permissions:
  contents: read

jobs:
  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: python -m pip install --upgrade pip pyyaml

      - name: Validate version-surfaces manifest schema
        run: python scripts/validate_version_surfaces.py

      - name: Check version consistency across surfaces
        run: python scripts/check_version_consistency.py --verbose
