[project]
name = "agent-platform-core"
version = "0.1.0"
description = "Core agent framework — Agent, Tool, Memory, Orchestrator primitives"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
  "anthropic>=0.28",
  "openai>=1.35",
  "pydantic>=2.7",
  "httpx>=0.27",
  "redis[hiredis]>=5.0",
  "asyncpg>=0.29",
  "sqlalchemy[asyncio]>=2.0",
  "pgvector>=0.3",
  "opentelemetry-api>=1.24",
  "opentelemetry-sdk>=1.24",
  "cryptography>=42.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_platform"]
