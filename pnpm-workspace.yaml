# Per ADR-002 v1 critical-path + ADR-009 §2(b): only critical-path packages
# in the default workspace. experimental/ is excluded so default
# `pnpm install` doesn't build deferred-feature packages. The MCP adapter
# (adapters/mcp) is in the critical-path scope per ADR-002 (minimal
# assert/query/recall/lint exposure); the dashboard moved to
# experimental/dashboard/ per PR 3.
packages:
  - "sdks/stigmem-ts"
  - "adapters/mcp"

overrides:
  postcss: ">=8.5.11"
  ip-address: ">=10.1.1"
  fast-uri: ">=3.1.2"
  hono: ">=4.12.18"
  qs: "6.15.2"
