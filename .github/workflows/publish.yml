name: Publish

on:
  push:
    branches: ["main"]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  NODE_IMAGE: ghcr.io/eidetic-labs/stigmem-node
  DASHBOARD_IMAGE: ghcr.io/eidetic-labs/stigmem-dashboard
  SDK_TS_VERSION_TAG: "v${{ github.ref_name }}"

jobs:
  publish-node:
    name: Build & push stigmem-node
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Required for cosign keyless signing via OIDC
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute PEP 440 and semver forms from the tag (per ADR-019). The git
      # tag uses PEP 440 shorthand (v0.9.0a1); semver-strict consumers (npm,
      # docker/metadata-action `type=semver`) need 0.9.0-alpha.1.
      - name: Translate tag → PEP 440 + semver
        id: ver
        if: startsWith(github.ref, 'refs/tags/')
        run: python3 scripts/translate_version.py "$GITHUB_REF_NAME" --gh-output

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        env:
          DOCKER_METADATA_PR_HEAD_SHA: "true"
        with:
          images: ${{ env.NODE_IMAGE }}
          # Three release tags on tagged builds: PEP 440 form (matches git tag),
          # semver form (matches npm spelling), and `latest`-on-main otherwise.
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.ver.outputs.pep440 }},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=${{ steps.ver.outputs.semver }},enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push (linux/amd64 + linux/arm64)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./node/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── SBOM ──────────────────────────────────────────────────────────────
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.NODE_IMAGE }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: stigmem-node-sbom.spdx.json
          upload-artifact: false

      - name: Attach SBOM to image (OCI referrer)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.NODE_IMAGE }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: stigmem-node-sbom
          path: stigmem-node-sbom.spdx.json
          retention-days: 90

      # ── Image signing (cosign keyless via OIDC) ────────────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        run: |
          cosign sign --yes \
            "${{ env.NODE_IMAGE }}@${{ steps.build.outputs.digest }}"

  publish-dashboard:
    name: Build & push stigmem-dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Translate tag → PEP 440 + semver
        id: ver
        if: startsWith(github.ref, 'refs/tags/')
        run: python3 scripts/translate_version.py "$GITHUB_REF_NAME" --gh-output

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DASHBOARD_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.ver.outputs.pep440 }},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=${{ steps.ver.outputs.semver }},enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./apps/dashboard/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_STIGMEM_API_URL=${{ vars.NEXT_PUBLIC_STIGMEM_API_URL }}

      # ── Image signing ──────────────────────────────────────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        run: |
          cosign sign --yes \
            "${{ env.DASHBOARD_IMAGE }}@${{ steps.build.outputs.digest }}"

  publish-sdk-ts:
    name: Publish stigmem-ts to npm
    runs-on: ubuntu-latest
    # Only publish on tagged releases that look like semver (e.g. v1.0.0)
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write   # for npm provenance

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build stigmem-ts
        run: pnpm --filter stigmem-ts build

      - name: Run tests (gate before publish)
        run: pnpm --filter stigmem-ts test

      # Translate the PEP-440-style git tag (v0.9.0a1) to the semver string
      # npm requires (0.9.0-alpha.1). Per ADR-019 §Per-ecosystem spelling.
      - name: Translate tag → PEP 440 + semver
        id: ver
        run: python3 scripts/translate_version.py "$GITHUB_REF_NAME" --gh-output

      - name: Stamp release version from tag (semver form for npm)
        run: |
          cd sdks/stigmem-ts
          pnpm pkg set version="${{ steps.ver.outputs.semver }}"
          echo "Publishing stigmem-ts@${{ steps.ver.outputs.semver }}"

      - name: Sanity check — package version is valid semver
        run: |
          cd sdks/stigmem-ts
          PUBLISHED_VER=$(node -p "require('./package.json').version")
          if ! node -e "
            const semver = require('semver');
            const v = process.argv[1];
            if (!semver.valid(v)) {
              console.error('Invalid semver:', v);
              process.exit(1);
            }
            console.log('OK:', v, 'is valid semver');
          " "$PUBLISHED_VER"; then
            echo "::error::package.json version $PUBLISHED_VER is not valid semver. The tag→semver translation is broken."
            exit 1
          fi

      - name: Publish to npm (with provenance)
        run: |
          cd sdks/stigmem-ts
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
