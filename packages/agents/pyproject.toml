[project]
name = "agent-platform-agents"
version = "0.1.0"
description = "Pre-built SMB agents — support, bookkeeping, scheduling"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
  "agent-platform-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agents"]
