name: Publish

on:
  push:
    branches: ["main"]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  NODE_IMAGE: ghcr.io/eidetic-labs/stigmem-node
  DASHBOARD_IMAGE: ghcr.io/eidetic-labs/stigmem-dashboard
  SDK_TS_VERSION_TAG: "v${{ github.ref_name }}"

jobs:
  publish-node:
    name: Build & push stigmem-node
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Required for cosign keyless signing via OIDC
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute PEP 440 and semver forms from the tag (per ADR-019). The git
      # tag uses PEP 440 shorthand (v0.9.0a1); semver-strict consumers (npm,
      # docker/metadata-action `type=semver`) need 0.9.0-alpha.1.
      - name: Translate tag → PEP 440 + semver
        id: ver
        if: startsWith(github.ref, 'refs/tags/')
        run: python3 scripts/translate_version.py "$GITHUB_REF_NAME" --gh-output

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        env:
          DOCKER_METADATA_PR_HEAD_SHA: "true"
        with:
          images: ${{ env.NODE_IMAGE }}
          # Three release tags on tagged builds: PEP 440 form (matches git tag),
          # semver form (matches npm spelling), and `latest`-on-main otherwise.
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.ver.outputs.pep440 }},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=${{ steps.ver.outputs.semver }},enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push (linux/amd64 + linux/arm64)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./node/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── SBOM ──────────────────────────────────────────────────────────────
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.NODE_IMAGE }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: stigmem-node-sbom.spdx.json
          upload-artifact: false

      - name: Attach SBOM to image (OCI referrer)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.NODE_IMAGE }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: stigmem-node-sbom
          path: stigmem-node-sbom.spdx.json
          retention-days: 90

      # ── Image signing (cosign keyless via OIDC) ────────────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        run: |
          cosign sign --yes \
            "${{ env.NODE_IMAGE }}@${{ steps.build.outputs.digest }}"

  publish-dashboard:
    name: Build & push stigmem-dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Translate tag → PEP 440 + semver
        id: ver
        if: startsWith(github.ref, 'refs/tags/')
        run: python3 scripts/translate_version.py "$GITHUB_REF_NAME" --gh-output

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DASHBOARD_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.ver.outputs.pep440 }},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=${{ steps.ver.outputs.semver }},enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./apps/dashboard/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_STIGMEM_API_URL=${{ vars.NEXT_PUBLIC_STIGMEM_API_URL }}

      # ── Image signing ──────────────────────────────────────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        run: |
          cosign sign --yes \
            "${{ env.DASHBOARD_IMAGE }}@${{ steps.build.outputs.digest }}"

  publish-sdk-ts:
    name: Publish @eidetic-labs/stigmem-ts to npm
    runs-on: ubuntu-latest
    # Only publish on tagged releases that look like semver (e.g. v1.0.0)
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write   # for npm provenance

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Filter by directory rather than package name — name-independent and
      # survives renames/scope changes (e.g. stigmem-ts → @eidetic-labs/stigmem-ts).
      - name: Build SDK
        run: pnpm --filter "./sdks/stigmem-ts" build

      - name: Run tests (gate before publish)
        run: pnpm --filter "./sdks/stigmem-ts" test

      # Translate the PEP-440-style git tag (v0.9.0a1) to the semver string
      # npm requires (0.9.0-alpha.1). Per ADR-019 §Per-ecosystem spelling.
      - name: Translate tag → PEP 440 + semver
        id: ver
        run: python3 scripts/translate_version.py "$GITHUB_REF_NAME" --gh-output

      - name: Stamp release version from tag (semver form for npm)
        run: |
          cd sdks/stigmem-ts
          pnpm pkg set version="${{ steps.ver.outputs.semver }}"
          echo "Publishing @eidetic-labs/stigmem-ts@${{ steps.ver.outputs.semver }}"

      - name: Sanity check — package version is valid semver
        run: |
          cd sdks/stigmem-ts
          PUBLISHED_VER=$(node -p "require('./package.json').version")
          if ! node -e "
            const semver = require('semver');
            const v = process.argv[1];
            if (!semver.valid(v)) {
              console.error('Invalid semver:', v);
              process.exit(1);
            }
            console.log('OK:', v, 'is valid semver');
          " "$PUBLISHED_VER"; then
            echo "::error::package.json version $PUBLISHED_VER is not valid semver. The tag→semver translation is broken."
            exit 1
          fi

      - name: Publish to npm (with provenance)
        # --tag is required for prereleases; npm rejects publish without it.
        # alpha/beta/rc go to their own dist-tags so `npm install <pkg>`
        # (no --tag) waits for a stable release on `latest`.
        run: |
          cd sdks/stigmem-ts
          npm publish --provenance --access public --tag "${{ steps.ver.outputs.npm_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-python:
    name: Build & publish Python packages to PyPI
    runs-on: ubuntu-latest
    # Tagged releases only — same gate as publish-sdk-ts.
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write   # for PyPI OIDC trusted publisher

    strategy:
      # Don't cancel siblings on first failure — partial publish is preferable to none.
      # Each package's PyPI Trusted Publisher config is independent.
      fail-fast: false
      matrix:
        package:
          # Protocol package (root pyproject.toml)
          - name: stigmem
            dir: .
          # Python SDK
          - name: stigmem-py
            dir: sdks/stigmem-py
          # FastAPI reference node service
          - name: stigmem-node
            dir: node
          # OpenClaw adapter — reset from 1.0.5 to 0.9.0a1 to align with the
          # canonical version line. v1.0.3 and v1.0.5 are yanked from PyPI
          # (declared a never-published stigmem-py>=1.0.0rc1 dep, were
          # uninstallable end-to-end). v0.9.0a1 is the first installable
          # release.
          - name: stigmem-openclaw
            dir: adapters/openclaw

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build wheel + sdist for ${{ matrix.package.name }}
        run: |
          cd "${{ matrix.package.dir }}"
          python -m build

      - name: Verify package metadata (twine check)
        run: |
          python -m pip install --upgrade twine
          twine check "${{ matrix.package.dir }}/dist/"*

      # Uses PyPI Trusted Publishers (OIDC) — no PYPI_API_TOKEN secret needed.
      # Per-package Trusted Publisher must be configured at pypi.org first:
      #   PyPI → Account → Publishing → Add a new pending publisher
      #     Project name: <matrix.package.name>
      #     Owner: Eidetic-Labs
      #     Repository: stigmem
      #     Workflow: publish.yml
      #     Environment: (leave blank)
      - name: Publish ${{ matrix.package.name }} to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ matrix.package.dir }}/dist
          # skip-existing prevents failure if a re-run hits an already-published
          # version (e.g., re-tagging the same v0.9.0a1 by accident); useful safety
          # net for the matrix (one pkg succeeded, others retried).
          skip-existing: true
