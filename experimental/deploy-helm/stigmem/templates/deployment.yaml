apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "stigmem.fullname" . }}
  labels:
    {{- include "stigmem.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "stigmem.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "stigmem.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8765
              protocol: TCP
          env:
            - name: STIGMEM_NODE_URL
              value: {{ .Values.stigmem.nodeUrl | quote }}
            - name: STIGMEM_LOG_LEVEL
              value: {{ .Values.stigmem.logLevel | quote }}
            - name: STIGMEM_AUTH_REQUIRED
              value: {{ .Values.stigmem.authRequired | quote }}
            - name: STIGMEM_DB_PATH
              value: {{ .Values.stigmem.dbPath | quote }}
            - name: STIGMEM_FEDERATION_ENABLED
              value: {{ .Values.stigmem.federationEnabled | quote }}
            - name: STIGMEM_FEDERATION_PULL_INTERVAL_S
              value: {{ .Values.stigmem.federationPullIntervalS | quote }}
            - name: STIGMEM_FEDERATION_PUSH_ENABLED
              value: {{ .Values.stigmem.federationPushEnabled | quote }}
            - name: STIGMEM_FEDERATION_NONCE_WINDOW_S
              value: {{ .Values.stigmem.federationNonceWindowS | quote }}
            - name: STIGMEM_FEDERATION_ALLOW_TEAM
              value: {{ .Values.stigmem.federationAllowTeam | quote }}
            {{- if .Values.stigmem.federationPubkey }}
            - name: STIGMEM_FEDERATION_PUBKEY
              value: {{ .Values.stigmem.federationPubkey | quote }}
            {{- end }}
            {{- if and .Values.federationKeypairSecret.name .Values.federationKeypairSecret.privkeyKey }}
            - name: STIGMEM_FEDERATION_PRIVKEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.federationKeypairSecret.name }}
                  key: {{ .Values.federationKeypairSecret.privkeyKey }}
            {{- else if .Values.stigmem.federationPrivkey }}
            - name: STIGMEM_FEDERATION_PRIVKEY
              value: {{ .Values.stigmem.federationPrivkey | quote }}
            {{- end }}
            - name: STIGMEM_DECAY_TTL_SECONDS
              value: {{ .Values.stigmem.decayTtlSeconds | quote }}
            - name: STIGMEM_DECAY_MIN_CONFIDENCE
              value: {{ .Values.stigmem.decayMinConfidence | quote }}
            - name: STIGMEM_ATTESTATION_REQUIRED
              value: {{ .Values.stigmem.attestationRequired | quote }}
            - name: STIGMEM_SOURCE_ATTESTATION_MODE
              value: {{ .Values.stigmem.sourceAttestationMode | quote }}
            - name: STIGMEM_OIDC_ENABLED
              value: {{ .Values.stigmem.oidcEnabled | quote }}
            {{- if .Values.stigmem.oidcIssuerUrl }}
            - name: STIGMEM_OIDC_ISSUER_URL
              value: {{ .Values.stigmem.oidcIssuerUrl | quote }}
            {{- end }}
            {{- if .Values.stigmem.oidcAudience }}
            - name: STIGMEM_OIDC_AUDIENCE
              value: {{ .Values.stigmem.oidcAudience | quote }}
            {{- end }}
            - name: STIGMEM_OIDC_TOKEN_TTL_HOURS
              value: {{ .Values.stigmem.oidcTokenTtlHours | quote }}
            {{- if .Values.stigmem.oidcAllowedDomains }}
            - name: STIGMEM_OIDC_ALLOWED_DOMAINS
              value: {{ .Values.stigmem.oidcAllowedDomains | quote }}
            {{- end }}
            - name: STIGMEM_ASYNC_JOB_THRESHOLD
              value: {{ .Values.stigmem.asyncJobThreshold | quote }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /run
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "stigmem.fullname" . }}
        {{- end }}
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: run
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
