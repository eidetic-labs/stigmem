# stigmem Docker Compose recipe
#
# Profiles:
#   default (no --profile flag) — single node, SQLite backend
#   --profile federation         — two-node local plaintext federation ring (SQLite)
#   --profile postgres           — placeholder; requires postgres backend (coming soon)
#
# Quick start (single node):
#   cp deploy/compose/.env.example deploy/compose/.env
#   # edit .env as needed
#   docker compose -f deploy/compose/docker-compose.yml --env-file deploy/compose/.env up -d
#
# Then verify:
#   curl http://localhost:8765/healthz
#   curl -s -X POST http://localhost:8765/v1/facts \
#     -H 'Content-Type: application/json' \
#     -d '{"entity":"hello","relation":"status","value":{"type":"string","v":"ok"},"source":"smoke","scope":"local"}'
#   curl -s 'http://localhost:8765/v1/facts?entity=hello&scope=local' | python3 -m json.tool
#
# Security posture (Phase 12):
#   - Non-root UID 65532 baked into image (see node/Dockerfile)
#   - Read-only root filesystem; /tmp and /run writable via tmpfs
#   - All Linux capabilities dropped
#   - Custom seccomp profile (deploy/seccomp/stigmem-node.json)

services:
  # ---------------------------------------------------------------------------
  # stigmem node — default profile (always started)
  # ---------------------------------------------------------------------------
  stigmem:
    build:
      context: ../..          # repo root; Dockerfile lives in node/
      dockerfile: node/Dockerfile
    image: stigmem-node:local
    ports:
      - "${STIGMEM_PORT:-8765}:8765"
    env_file:
      - .env
    environment:
      STIGMEM_HOST: "0.0.0.0"
      STIGMEM_PORT: "8765"
      STIGMEM_DB_PATH: "/data/stigmem.db"
      STIGMEM_NODE_URL: "${STIGMEM_NODE_URL:-http://localhost:8765}"
      STIGMEM_LOG_LEVEL: "${STIGMEM_LOG_LEVEL:-info}"
      STIGMEM_AUTH_REQUIRED: "${STIGMEM_AUTH_REQUIRED:-true}"
      STIGMEM_FEDERATION_ENABLED: "${STIGMEM_FEDERATION_ENABLED:-false}"
      STIGMEM_STORAGE_BACKEND: "${STIGMEM_STORAGE_BACKEND:-sqlite}"
      STIGMEM_AT_REST_ENCRYPTION: "${STIGMEM_AT_REST_ENCRYPTION:-off}"
    volumes:
      - stigmem-data:/data
    # ── Security hardening (Phase 12) ──────────────────────────────────────────
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
      - /run:mode=755,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp:../../deploy/seccomp/stigmem-node.json
    # ──────────────────────────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8765/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # second node for local two-node federation testing (--profile federation)
  # This profile is a local plaintext demo and explicitly opts in to insecure
  # federation. Production federation must configure mTLS instead.
  # ---------------------------------------------------------------------------
  stigmem-b:
    profiles: [federation]
    build:
      context: ../..
      dockerfile: node/Dockerfile
    image: stigmem-node:local
    ports:
      - "8766:8765"
    environment:
      STIGMEM_HOST: "0.0.0.0"
      STIGMEM_PORT: "8765"
      STIGMEM_DB_PATH: "/data/stigmem.db"
      STIGMEM_NODE_URL: "http://stigmem-b:8765"
      STIGMEM_LOG_LEVEL: "${STIGMEM_LOG_LEVEL:-info}"
      STIGMEM_AUTH_REQUIRED: "${STIGMEM_AUTH_REQUIRED:-true}"
      STIGMEM_FEDERATION_ENABLED: "true"
      STIGMEM_FEDERATION_INSECURE: "1"
      STIGMEM_STORAGE_BACKEND: "sqlite"
    volumes:
      - stigmem-b-data:/data
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
      - /run:mode=755,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp:../../deploy/seccomp/stigmem-node.json
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8765/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Postgres sidecar placeholder (--profile postgres)
  # The stigmem Postgres storage backend is tracked separately.
  # This service is defined here so the profile slot is reserved; the stigmem
  # service will gain STIGMEM_STORAGE_BACKEND=postgres support in a future release.
  # ---------------------------------------------------------------------------
  postgres:
    profiles: [postgres]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-stigmem}"
      POSTGRES_USER: "${POSTGRES_USER:-stigmem}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-<CHANGE_ME>}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stigmem}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  stigmem-data:
  stigmem-b-data:
  postgres-data:
