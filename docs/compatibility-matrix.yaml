# release/compatibility-matrix.yaml — per ADR-014
#
# Source-of-truth YAML for cross-package compatibility relationships.
# Consumed by scripts/check_compatibility_matrix.py (CI validator) and a
# Docusaurus plugin that renders this as the Operate → Compatibility page.
#
# Initial population at v0.9.0a1 baseline. Update on every release.

generated_for_protocol_version: 0.9.0a2

packages:
  node:
    name: stigmem-node
    versions:
      - "0.9.0a2"
      - "0.9.0a1"
