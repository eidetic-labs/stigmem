[project]
name = "ai-platform"
version = "0.1.0"
description = "Open-source AI platform for SMBs — agent framework, compliance engine, and developer tools"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [
  { name = "Acme Corp", email = "oss@acmecorp.ai" },
]

[tool.uv.workspace]
members = [
  "stigmem/node",
  "sdks/stigmem-py",
  "packages/core",
  "packages/agents",
  "packages/compliance",
  "packages/integrations/shopify",
  "packages/integrations/woocommerce",
  "packages/integrations/stripe",
  "packages/integrations/github",
  "packages/integrations/aws",
  "packages/integrations/google-workspace",
  "apps/api",
]

[tool.uv.sources]
agent-platform-core = { workspace = true }
agent-platform-agents = { workspace = true }
agent-platform-compliance = { workspace = true }
agent-platform-integration-shopify = { workspace = true }
agent-platform-integration-woocommerce = { workspace = true }
agent-platform-integration-stripe = { workspace = true }
agent-platform-integration-github = { workspace = true }
agent-platform-integration-aws = { workspace = true }
agent-platform-integration-google-workspace = { workspace = true }

[dependency-groups]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "pytest-cov>=5.0",
  "respx>=0.21",
  "ruff>=0.4",
  "mypy>=1.10",
  "bandit>=1.7",
  "pip-audit>=2.7",
]

[tool.uv]
default-groups = ["dev"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "S"]
ignore = ["S101"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests", "packages", "apps"]
addopts = "--cov --cov-report=xml --cov-report=term-missing"

[tool.coverage.run]
source = ["packages", "apps"]
omit = ["*/tests/*", "*/migrations/*"]

[tool.bandit]
exclude_dirs = ["tests", ".venv"]
skips = ["B101"]
