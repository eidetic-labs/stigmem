# Two-node stigmem federation quickstart.
# Build context is the repo root (Dockerfile lives in node/).
# Usage: docker compose up --build -d
# Then follow docs/quickstart.md to complete the federation handshake.
services:
  node-a:
    build:
      context: .
      dockerfile: node/Dockerfile
    ports:
      - "8765:8765"
    environment:
      STIGMEM_NODE_URL: "http://node-a:8765"
      STIGMEM_FEDERATION_ENABLED: "true"
      STIGMEM_DB_PATH: "/data/stigmem.db"
      STIGMEM_LOG_LEVEL: "info"
    volumes:
      - node-a-data:/data
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
      - /run:mode=755,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  node-b:
    build:
      context: .
      dockerfile: node/Dockerfile
    ports:
      - "8766:8765"
    environment:
      STIGMEM_NODE_URL: "http://node-b:8765"
      STIGMEM_FEDERATION_ENABLED: "true"
      STIGMEM_DB_PATH: "/data/stigmem.db"
      STIGMEM_LOG_LEVEL: "info"
    volumes:
      - node-b-data:/data
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
      - /run:mode=755,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  node-a-data:
  node-b-data:
