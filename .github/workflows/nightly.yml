name: Nightly Reliability

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC daily on main
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: read

jobs:
  docs-build:
    name: Docs build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: docs/package-lock.json

      - name: Build docs
        run: bash scripts/check.sh docs

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-build-${{ github.run_id }}
          path: docs/build/
          retention-days: 30

  quickstart-smoke:
    name: Quickstart Docker smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Run quickstart smoke
        run: bash scripts/quickstart-verify.sh

  dashboard-e2e:
    name: Dashboard Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter dashboard exec playwright install --with-deps chromium

      - name: Run dashboard browser smoke
        run: pnpm --filter dashboard exec playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dashboard-playwright-${{ github.run_id }}
          path: |
            experimental/dashboard/test-results/
            experimental/dashboard/playwright-report/
          retention-days: 30

  sdk-backward-compat:
    name: Previous-release SDK compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Run backward compatibility smoke
        run: bash scripts/check_sdk_backward_compat.sh

      - name: Upload compatibility report
        uses: actions/upload-artifact@v7
        with:
          name: sdk-backward-compat-${{ github.run_id }}
          path: artifacts/sdk-backward-compat.json
          retention-days: 30

  migration-compat:
    name: Schema migration compatibility
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install workspace packages
        run: uv sync --all-packages

      - name: Run migration compatibility tests
        run: |
          mkdir -p artifacts
          uv run pytest node/tests/lifecycle/test_migration_compat.py -q --tb=short \
            --timeout=120 \
            --junitxml=artifacts/migration-compat-junit.xml

      - name: Upload migration report
        uses: actions/upload-artifact@v7
        with:
          name: migration-compat-${{ github.run_id }}
          path: artifacts/migration-compat-junit.xml
          retention-days: 30

  federation-soak:
    name: Federation soak (1 h)
    runs-on: ubuntu-latest
    timeout-minutes: 90     # 1-hour soak + 30 min buffer for build/teardown

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('node/Dockerfile', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install workspace packages
        run: uv sync --all-packages

      - name: Pre-build stigmem image (cache warm-up)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./node/Dockerfile
          load: true
          tags: stigmem-node:soak
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache (avoid unbounded growth)
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Run federation soak (1 hour)
        run: make eval-soak
        env:
          DOCKER_BUILDKIT: "1"

      - name: Upload soak artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: soak-results-${{ github.run_id }}
          path: eval/results/
          retention-days: 30

      - name: Fail on soak failure
        if: failure()
        run: |
          echo "Federation soak failed — check eval/results/ artifact for details"
          exit 1
